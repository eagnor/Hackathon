const detectSymptom = (msg) => {
  const m = (msg || "").toLowerCase();
  if (/chest|heart|cardiac|सीना|सीने|छाती/.test(m)) return "chest";
  if (/back|spine|lumbar|पीठ|पाठ/.test(m)) return "back";
  if (/diarr|loose stool|motion|vomit|stomach|दस्त|उल्टी|जुलाब/.test(m)) return "diarrhoea";
  if (/headache|migraine|head pain|सिरदर्द|डोकेदुखी/.test(m)) return "headache";
  if (/cough|tb|tuberc|खांसी|खोकला/.test(m)) return "cough";
  if (/pregnan|maternity|antenatal|delivery|गर्भ/.test(m)) return "pregnancy";
  if (/skin|rash|itch|fungal|त्वचा/.test(m)) return "skin";
  if (/eye|vision|conjunctiv|आँख/.test(m)) return "eye";
  if (/child|baby|infant|toddler|बच्चा/.test(m)) return "child";
  return "fever";
};

const detectRedFlags = (userMessages) => {
  const combined = userMessages.join(" ").toLowerCase();
  const flags = { critical: false, moderate: false, signals: [] };
  if (/can'?t breathe|difficulty breath|shortness of breath|सांस नहीं|सांस में तकलीफ/.test(combined)) { flags.critical = true; flags.signals.push("breathing difficulty"); }
  if (/unconscious|faint|collapse|बेहोश/.test(combined)) { flags.critical = true; flags.signals.push("loss of consciousness"); }
  if (/blood|bleeding|खून/.test(combined)) { flags.critical = true; flags.signals.push("bleeding"); }
  if (/convuls|seizure|fit|दौरा/.test(combined)) { flags.critical = true; flags.signals.push("seizure"); }
  if (/\b(8|9|10)\s*(\/\s*10|out of)/.test(combined)) { flags.critical = true; flags.signals.push("severe pain (8-10/10)"); }
  if (/\b(5|6|7)\s*(\/\s*10|out of)/.test(combined)) { flags.moderate = true; flags.signals.push("moderate pain (5-7/10)"); }
  if (/diabetes|hypertens|heart disease|diabetic|मधुमेह|उच्च रक्तचाप/.test(combined)) { flags.moderate = true; flags.signals.push("chronic condition"); }
  if (/3 days|4 days|5 days|week|तीन दिन|चार दिन|हफ्ते/.test(combined)) { flags.moderate = true; flags.signals.push("prolonged duration"); }
  if (/no|not|can't|unable|नहीं/.test(combined) && /eat|drink|food|water|खाना|पानी/.test(combined)) { flags.moderate = true; flags.signals.push("unable to eat/drink"); }
  return flags;
};

const topicPatterns = {
  duration:    /how long|since when|कब से|ಎಷ್ಟು ದಿನ/i,
  severity:    /scale|1 to 10|severe|intensity|तीव्र/i,
  associated:  /other symptoms|also|cough|headache|associated|अन्य लक्षण/i,
  medication:  /medicin|drug|tablet|pill|दवा|ಔಷಧ/i,
  history:     /chronic|diabetes|hypertens|condition|पुरानी बीमारी/i,
  eating:      /eat|drink|food|water|खाना|पानी/i,
  breathing:   /breath|chest pain|सांस/i,
  location:    /where|centre|left|right|upper|lower|कहाँ/i,
  blood:       /blood|mucus|खून/i,
  vomit:       /vomit|nausea|उल्टी/i,
  stool:       /stool|loose|motion|दस्त/i,
};

const getTopicFromQ = (q) => {
  for (const [topic, pattern] of Object.entries(topicPatterns)) {
    if (pattern.test(q)) return topic;
  }
  return null;
};

const userAnsweredTopic = (topic, userMsgs) => {
  if (!topic) return false;
  const combined = userMsgs.join(" ").toLowerCase();
  const kwds = {
    duration: /day|week|hour|since|ago|कल|आज|दिन/, severity: /\d|mild|severe|bad/, associated: /yes|no|also|हाँ|नहीं/,
    medication: /yes|no|tablet|हाँ|नहीं|दवा/, history: /yes|no|diabetic|हाँ|नहीं/, eating: /yes|no|little|nothing|हाँ|नहीं/,
    breathing: /yes|no|हाँ|नहीं/, location: /left|right|centre|middle|upper|lower|बाईं|दाईं/,
    blood: /yes|no|हाँ|नहीं|blood|खून/, vomit: /yes|no|हाँ|नहीं/, stool: /\d|times|बार/,
  };
  return kwds[topic]?.test(combined) && userMsgs.length > 0;
};

const buildDynamicAssessment = (symptomKey, lang, flags) => {
  const base = mockScripts[symptomKey];
  const baseScript = base[lang] || base.en;
  const canned = baseScript[baseScript.length - 1];
  if (!flags.critical && !flags.moderate) return canned;
  const lines = canned.split("\n").map(l => l.trim()).filter(Boolean);
  const get = (key) => { const l = lines.find(l => l.toLowerCase().startsWith(key.toLowerCase() + ":")); return l ? l.split(":").slice(1).join(":").trim() : ""; };
  const severity = flags.critical ? "Critical" : "Moderate";
  const action = flags.critical ? "Emergency — call ambulance" : "Teleconsult today";
  const doctorBrief = flags.critical
    ? `RED FLAGS detected: ${flags.signals.join(", ")}. ${get("Doctor brief")}`
    : `${get("Doctor brief")} Note: ${flags.signals.join(", ")} reported.`;
  const careAdvice = flags.critical
    ? `URGENT: ${flags.signals.join(", ")} detected. Call 108 immediately. ${get("Care advice")}`
    : get("Care advice");
  return `ASSESSMENT:\nSeverity: ${severity}\nLikely condition: ${get("Likely condition")}\nRecommended action: ${action}\nDoctor brief: ${doctorBrief}\nCare advice: ${careAdvice}`;
};

let _detectedSymptom = null;
let _askedIndices = [];
let _sessionUserMsgs = [];

const getMockResponse = (lang, messageIndex, firstUserMessage, allMessages) => {
  if (messageIndex === 0) { _detectedSymptom = detectSymptom(firstUserMessage); _askedIndices = []; _sessionUserMsgs = []; }
  if (allMessages) { _sessionUserMsgs = allMessages.filter(m => m.role === "user").map(m => m.content); }
  else if (firstUserMessage) { _sessionUserMsgs = [firstUserMessage]; }
  const key = _detectedSymptom || "fever";
  const script = mockScripts[key];
  const responses = script[lang] || script.en;
  const questions = responses.slice(0, -1);
  const flags = detectRedFlags(_sessionUserMsgs);
  if (flags.critical && _askedIndices.length >= 2) return buildDynamicAssessment(key, lang, flags);
  if (messageIndex >= questions.length || _askedIndices.length >= questions.length) return buildDynamicAssessment(key, lang, flags);
  for (let i = 0; i < questions.length; i++) {
    if (_askedIndices.includes(i)) continue;
    const topic = getTopicFromQ(questions[i]);
    if (topic && userAnsweredTopic(topic, _sessionUserMsgs.slice(0, -1))) continue;
    _askedIndices.push(i);
    return questions[i];
  }
  return buildDynamicAssessment(key, lang, flags);
};

const useTTS = (lang) => {
  const synthRef = React.useRef(null);
  const langCode = langVoice[lang] || "en-IN";

  const speak = React.useCallback((text, onEnd) => {
    if (!("speechSynthesis" in window)) { onEnd && onEnd(); return; }
    window.speechSynthesis.cancel();
    if (!text) { onEnd && onEnd(); return; }

    const clean = text.includes("ASSESSMENT:") ? "Assessment complete. Please review the results." : text;
    const utter = new SpeechSynthesisUtterance(clean);
    utter.lang = langCode;
    utter.rate = 0.88;
    utter.pitch = 1.0;

    utter.onend = () => { onEnd && onEnd(); };
    utter.onerror = (e) => { if (e.error !== "interrupted") console.warn("TTS:", e.error); onEnd && onEnd(); };

    const doSpeak = () => {
      const voices = window.speechSynthesis.getVoices();
      const langPrefix = langCode.split("-")[0];
      const match = voices.find(v => v.lang === langCode)
        || voices.find(v => v.lang.startsWith(langPrefix))
        || voices.find(v => v.lang.includes("IN"))
        || null;
      if (match) utter.voice = match;
      window.speechSynthesis.speak(utter);
    };

    const voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) { doSpeak(); }
    else { window.speechSynthesis.onvoiceschanged = doSpeak; }

    synthRef.current = utter;
  }, [langCode]);

  const stop = React.useCallback(() => {
    window.speechSynthesis?.cancel();
  }, []);

  return { speak, stop };
};

const SymptomChat = ({ patient, onComplete, onBack, t, lang }) => {
  const tx = (key) => T[lang]?.[key] || T.en[key] || key;
  const SYSTEM_PROMPT = buildSystemPrompt(lang, patient.name, patient.age, patient.village);

  const openingByLang = {
    en: `Hello! I'm here to help assess ${patient.name}. What is their main complaint today?`,
    hi: `नमस्ते! मैं ${patient.name} की जांच में मदद करूंगा। आज उनकी मुख्य समस्या क्या है?`,
    kn: `ನಮಸ್ಕಾರ! ನಾನು ${patient.name} ರ ತಪಾಸಣೆಯಲ್ಲಿ ಸಹಾಯ ಮಾಡುತ್ತೇನೆ. ಇಂದು ಅವರ ಮುಖ್ಯ ಸಮಸ್ಯೆ ಏನು?`,
    ta: `வணக்கம்! ${patient.name} ஐ மதிப்பிட உதவுகிறேன். இன்று அவர்களின் முக்கிய பிரச்சனை என்ன?`,
    te: `నమస్కారం! ${patient.name} కోసం అసెస్‌మెంట్ చేయడంలో సహాయం చేస్తాను. నేడు వారి ప్రధాన సమస్య ఏమిటి?`,
    mr: `नमस्कार! मी ${patient.name} यांच्या तपासणीत मदत करेन. आज त्यांची मुख्य तक्रार काय आहे?`,
  };

  const [messages, setMessages] = React.useState([
    { role: "assistant", content: openingByLang[lang] || openingByLang.en }
  ]);
  const [input, setInput] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [assessment, setAssessment] = React.useState(null);
  const [voiceState, setVoiceState] = React.useState("idle");
  const [liveTranscript, setLiveTranscript] = React.useState("");
  const [voiceSupported, setVoiceSupported] = React.useState(true);
  const [micBlocked, setMicBlocked] = React.useState(false);

  const bottomRef = React.useRef();
  const recognitionRef = React.useRef(null);
  const finalTranscriptRef = React.useRef("");
  const isRecognizingRef = React.useRef(false);

  const { speak, stop: stopTTS } = useTTS(lang);

  // Create ONE recognition instance for the whole session to avoid repeated mic permission prompts
  React.useEffect(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setVoiceSupported(false); return; }
    const rec = new SR();
    rec.continuous = false;
    rec.interimResults = true;
    rec.maxAlternatives = 1;
    recognitionRef.current = rec;
    return () => { try { rec.abort(); } catch {} };
  }, []);

  React.useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, loading, liveTranscript]);

  React.useEffect(() => {
    const timer = setTimeout(() => {
      setVoiceState("speaking");
      speak(openingByLang[lang] || openingByLang.en, () => setVoiceState("idle"));
    }, 600);
    return () => clearTimeout(timer);
  }, []);

  const parseAssessment = (text) => {
    if (!text.includes("ASSESSMENT:")) return null;
    const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
    const get = (key) => {
      const line = lines.find(l => l.toLowerCase().startsWith(key.toLowerCase() + ":"));
      return line ? line.split(":").slice(1).join(":").trim() : "";
    };
    return {
      severity: get("Severity"),
      condition: get("Likely condition"),
      action: get("Recommended action"),
      doctorBrief: get("Doctor brief"),
      careAdvice: get("Care advice"),
    };
  };

  const sendMessage = React.useCallback(async (text) => {
    if (!text?.trim() || loading) return;
    stopTTS();
    isRecognizingRef.current = false;
    finalTranscriptRef.current = "";
    setLiveTranscript("");
    setVoiceState("idle");
    setInput("");

    const userMsg = { role: "user", content: text.trim() };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setLoading(true);

    // Smart Mock AI — context-aware, red-flag sensitive
    const userMsgCount = newMessages.filter(m => m.role === "user").length;

    setTimeout(() => {
      const firstUserMsg = newMessages.find(m => m.role === "user")?.content || "";
      const reply = getMockResponse(lang, userMsgCount - 1, firstUserMsg, newMessages);

      setMessages(prev => [...prev, { role: "assistant", content: reply }]);
      setLoading(false);

      const parsed = parseAssessment(reply);
      if (parsed?.severity) {
        setAssessment(parsed);
        setVoiceState("speaking");
        speak("Assessment is complete. Please review the results.", () => setVoiceState("idle"));
      } else {
        setVoiceState("speaking");
        speak(reply, () => {
          setVoiceState("idle");
          setTimeout(() => startListening(), 400);
        });
      }
    }, 900);
  }, [messages, loading, SYSTEM_PROMPT, speak, stopTTS]);

  const startListening = React.useCallback(() => {
    const rec = recognitionRef.current;
    if (!rec) { setVoiceSupported(false); return; }
    if (loading || isRecognizingRef.current) return;

    stopTTS();
    finalTranscriptRef.current = "";
    setLiveTranscript("");
    setMicBlocked(false);

    // Re-set lang in case it changed, reuse same instance (no new permission prompt)
    rec.lang = langVoice[lang] || "en-IN";

    rec.onstart = () => {
      isRecognizingRef.current = true;
      setVoiceState("listening");
    };

    rec.onresult = (e) => {
      let interimText = "";
      let finalText = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const transcript = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalText += transcript;
        else interimText += transcript;
      }
      const display = finalText || interimText;
      setLiveTranscript(display);
      if (finalText) finalTranscriptRef.current = finalText;
    };

    rec.onerror = (e) => {
      isRecognizingRef.current = false;
      if (e.error === "not-allowed" || e.error === "permission-denied") {
        setMicBlocked(true);
        setVoiceState("idle");
      } else if (e.error === "no-speech") {
        setVoiceState("idle");
      } else if (e.error === "network") {
        setVoiceState("idle");
        setMicBlocked(true);
      } else if (e.error !== "aborted") {
        setVoiceState("idle");
      }
      setLiveTranscript("");
    };

    rec.onend = () => {
      isRecognizingRef.current = false;
      const captured = finalTranscriptRef.current.trim() || liveTranscript.trim();
      if (captured) {
        setVoiceState("processing");
        sendMessage(captured);
      } else {
        setVoiceState("idle");
        setLiveTranscript("");
      }
    };

    try { rec.start(); } catch (e) {
      isRecognizingRef.current = false;
      setVoiceState("idle");
    }
  }, [lang, loading, stopTTS, sendMessage, liveTranscript]);

  const stopListening = React.useCallback(() => {
    if (recognitionRef.current && isRecognizingRef.current) {
      try { recognitionRef.current.stop(); } catch {}
    }
  }, []);

  const handleMicTap = React.useCallback(() => {
    if (loading) return;
    if (voiceState === "speaking") {
      stopTTS();
      setVoiceState("idle");
    } else if (voiceState === "listening") {
      // Force stop recognition
      isRecognizingRef.current = false;
      if (recognitionRef.current) {
        try { recognitionRef.current.stop(); } catch(e) {}
        try { recognitionRef.current.abort(); } catch(e) {}
      }
      setVoiceState("idle");
      setLiveTranscript("");

      <div style={{ flex: 1, position: "relative" }}>
        <iframe
          src={`https://meet.jit.si/${jitsiRoom}#userInfo.displayName="${encodeURIComponent("ASHA Worker - " + (patient?.village || "Sahayak"))}"&config.startWithVideoMuted=false&config.startWithAudioMuted=false&config.toolbarButtons=["microphone","camera","hangup"]`}
          allow="camera; microphone; fullscreen; display-capture; autoplay"
          style={{ width: "100%", height: "100%", border: "none", display: "block" }}
          title="Video Consult"
        />
      </div>

      {/* Notes strip */}
      <div style={{ background: t.surface, borderTop: `1px solid ${t.border}`, display: "flex", flexDirection: "column", maxHeight: "120px" }}>
        <div style={{ flex: 1, overflowY: "auto", padding: "6px 12px", display: "flex", flexDirection: "column", gap: "4px" }}>
          {chatMessages.map((m, i) => (
            <div key={i} style={{
              alignSelf: m.from === "asha" ? "flex-end" : "flex-start",
              background: m.from === "asha" ? t.accent : t.surfaceHigh,
              color: t.text, borderRadius: "10px", padding: "5px 10px", fontSize: "12px", maxWidth: "80%",
            }}>{m.text}</div>
          ))}
        </div>
        <div style={{ padding: "6px 12px", display: "flex", gap: "8px", borderTop: `1px solid ${t.border}` }}>
          <input
            value={chatInput} onChange={e => setChatInput(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleSendChat()}
            placeholder="Add note for doctor..."
            style={{ flex: 1, background: t.surfaceHigh, border: `1px solid ${t.border}`, borderRadius: "8px", padding: "7px 10px", fontSize: "12px", color: t.text, outline: "none" }}
          />
          <button onClick={handleSendChat} style={{ background: t.accent, border: "none", borderRadius: "8px", padding: "7px 12px", color: "#fff", fontSize: "12px", fontWeight: 600, cursor: "pointer" }}>Send</button>
        </div>
      </div>

      <div style={{ padding: "10px 20px", background: t.surface }}>
        <button onClick={onEnd} style={{ width: "100%", background: t.red, border: "none", borderRadius: "12px", padding: "12px", color: "#fff", fontSize: "13px", fontWeight: 600, cursor: "pointer" }}>{tx("endCall")}</button>
      </div>
    </div>
  );
};



const PatientProfile = ({ patient, onBack, t, lang, onStartAssessment }) => {
  const tx = (key) => T[lang]?.[key] || T.en[key] || key;
  return (
    <div style={{ flex: 1, overflow: "hidden", display: "flex", flexDirection: "column" }}>
      <TopBar title={tx("patientProfile")} onBack={onBack} theme={t} />
      <div style={{ flex: 1, overflowY: "auto", padding: "20px", display: "flex", flexDirection: "column", gap: "16px" }}>
        <div style={{ textAlign: "center", padding: "30px 20px", background: t.surfaceHigh, borderRadius: "16px" }}>
          <div style={{ fontSize: "56px", marginBottom: "12px" }}>👤</div>
          <h2 style={{ margin: "0 0 8px", color: t.text }}>{patient.name}</h2>
          <p style={{ color: t.textSub, fontSize: "15px" }}>{patient.age} years • {patient.village}</p>
        </div>

        <Btn label={tx("startAssessment")} onClick={() => onStartAssessment(patient)} />

        <div style={{ background: t.surfaceHigh, borderRadius: "16px", padding: "16px" }}>
          <div style={{ fontWeight: 600, marginBottom: "12px", color: t.text }}>{tx("caseHistory")}</div>
          {patient.history?.length > 0 ? (
            patient.history.map((h, i) => (
              <div key={i} style={{ padding: "12px", background: t.bg, borderRadius: "10px", marginBottom: "8px", fontSize: "13px" }}>
                <strong>{h.date}</strong> — {h.symptom} ({h.severity})
              </div>
            ))
          ) : (
            <p style={{ color: t.textMuted, fontStyle: "italic" }}>{tx("noHistory")}</p>
          )}
        </div>
      </div>
    </div>
  );
};



const Prescription = ({ patient, assessment, onBack, t, lang }) => {
  const tx = (key) => T[lang]?.[key] || T.en[key] || key;
  return (
    <div style={{ flex: 1, overflow: "hidden", display: "flex", flexDirection: "column" }}>
      <TopBar title={tx("prescription")} onBack={onBack} theme={t} />
      <div style={{ flex: 1, padding: "20px", overflowY: "auto" }}>
        <div style={{ background: t.surfaceHigh, borderRadius: "16px", padding: "20px" }}>
          <h3 style={{ margin: "0 0 16px", color: t.text }}>{patient.name}</h3>
          <p><strong>{tx("diagnosis")}:</strong> {assessment?.condition || "Fever & Cough"}</p>
          <p><strong>{tx("dosage")}:</strong> Tab. Paracetamol 500mg — 1 tab thrice daily × 5 days</p>
          <p><strong>{tx("instructions")}:</strong> Take with food. Plenty of fluids.</p>
        </div>

        <Btn label={tx("sendRx")} onClick={() => alert(tx("orderPlaced") || "Order Placed!")} style={{ marginTop: "20px" }} />
        <Btn label={tx("shareWhatsApp")} variant="ghost" style={{ marginTop: "12px" }} />
      </div>

};



const PharmacyMap = ({ onBack, t, lang }) => {

  return (
    <div style={{ flex: 1, overflow: "hidden", display: "flex", flexDirection: "column" }}>
      <TopBar title={tx("pharmacyMap") || "Nearby Pharmacies"} onBack={onBack} theme={t} />
      <div style={{ flex: 1, padding: "20px", overflowY: "auto" }}>
        <div style={{ background: t.surfaceHigh, borderRadius: "16px", padding: "20px", textAlign: "center" }}>
          <p style={{ fontSize: "48px", margin: "20px 0" }}>🗺️</p>
          <h3>Nearby Jan Aushadhi & Pharmacies</h3>
          <p style={{ color: t.textSub }}>Map view would appear here</p>
        </div>
      </div>

const SpecialistRouting = ({ onBack, t, lang }) => {
  const tx = (key) => T[lang]?.[key] || T.en[key] || key;
  return (
    <div style={{ flex: 1, overflow: "hidden", display: "flex", flexDirection: "column" }}>
      <TopBar title={tx("specialistRouting") || "Specialist Referral"} onBack={onBack} theme={t} />
      <div style={{ flex: 1, padding: "20px", overflowY: "auto", textAlign: "center" }}>
        <p style={{ fontSize: "48px", margin: "40px 0" }}>🏥</p>
        <h3>Specialist Routing</h3>
        <p style={{ color: t.textSub }}>Referral to nearest facility / Tele-Specialist</p>
      </div>
    </div>

};



const App = () => {
  const [theme, setTheme] = React.useState(makeTheme(true));
  const [lang, setLang] = React.useState("en");
  const [screen, setScreen] = React.useState("login");
  const [user, setUser] = React.useState(null);
  const [currentPatient, setCurrentPatient] = React.useState(null);
  const [assessment, setAssessment] = React.useState(null);

  const t = theme;
  const tx = (key) => T[lang]?.[key] || T.en[key] || key;

  const handleLogin = (data) => {
    setUser(data);
    setLang(data.lang || "en");
    setScreen("dashboard");
  };

  const handleNewCase = () => setScreen("newPatient");

  const handlePatientSelect = (p) => {
    setCurrentPatient(p);
    setScreen("patientProfile");
  };

  const startAssessmentFlow = (patient) => {
    setCurrentPatient(patient);
    setAssessment(null);
    setScreen("symptomChat");
  };

  const completeAssessment = (assess, history) => {
    setAssessment(assess);
    setScreen("triageResult");
  };

  return (
    <div style={{
      height: "100dvh",
      background: t.bg,
      color: t.text,
      fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif",
      display: "flex",
      flexDirection: "column",
      overflow: "hidden",
      maxWidth: "480px",
      margin: "0 auto",
      boxShadow: "0 0 30px rgba(0,0,0,0.3)",
    }}>
      {screen === "login" && (
        <Login onLogin={handleLogin} onSkip={() => { setUser({ role: "asha" }); setScreen("dashboard"); }} initialLang={lang} />
      )}

      {screen === "dashboard" && (
        <Dashboard onNewCase={handleNewCase} onPatient={handlePatientSelect} onSettings={() => setScreen("settings")} t={t} lang={lang} />
      )}

      {screen === "newPatient" && (
        <NewPatient onStart={startAssessmentFlow} onBack={() => setScreen("dashboard")} t={t} lang={lang} />
      )}

      {screen === "symptomChat" && currentPatient && (
        <SymptomChat patient={currentPatient} onComplete={completeAssessment} onBack={() => setScreen("newPatient")} t={t} lang={lang} />
      )}

      {screen === "triageResult" && currentPatient && assessment && (
        <TriageResult
          patient={currentPatient}
          assessment={assessment}
          onBook={() => setScreen("teleconsult")}
          onBack={() => setScreen("symptomChat")}
          onSpecialist={() => setScreen("specialist")}
          onEmergency={() => setScreen("emergency")}
          t={t}
          lang={lang}
        />
      )}

      {screen === "emergency" && currentPatient && (
        <EmergencyDispatch patient={currentPatient} assessment={assessment} onBack={() => setScreen("triageResult")} t={t} lang={lang} />
      )}

      {screen === "teleconsult" && (
        <Teleconsult patient={currentPatient} assessment={assessment} onBack={() => setScreen("triageResult")} onEnd={() => setScreen("prescription")} t={t} lang={lang} />
      )}

      {screen === "prescription" && (
        <Prescription patient={currentPatient} assessment={assessment} onBack={() => setScreen("triageResult")} t={t} lang={lang} />
      )}

      {screen === "patientProfile" && currentPatient && (
        <PatientProfile patient={currentPatient} onBack={() => setScreen("dashboard")} t={t} lang={lang} onStartAssessment={startAssessmentFlow} />
      )}

      {screen === "specialist" && (
        <SpecialistRouting onBack={() => setScreen("triageResult")} t={t} lang={lang} />
      )}

      {screen === "pharmacy" && (
        <PharmacyMap onBack={() => setScreen("triageResult")} t={t} lang={lang} />
      )}

      {screen === "settings" && (
        <div style={{ flex: 1, padding: "20px" }}>
          <TopBar title={tx("settings")} onBack={() => setScreen("dashboard")} theme={t} />
          <div style={{ paddingTop: "40px" }}>
            <Btn label={t.dark ? tx("lightMode") : tx("darkMode")} onClick={() => setTheme(makeTheme(!t.dark))} />
            <Btn label={tx("logout")} variant="danger" onClick={() => { setUser(null); setScreen("login"); }} style={{ marginTop: "16px" }} />
          </div>
        </div>
      )}
    </div>
  );
};

App;



const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  </script>
</body>
</html>
